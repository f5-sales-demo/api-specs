---
extends:
  - "spectral:oas"

rules:
  # F5 XC APIs use dotted parameter names (metadata.namespace, metadata.name)
  # which Spectral's built-in path-params rule incorrectly flags.
  # Disable it here; our pipeline uses spectral-pipeline.yaml with a custom
  # f5-path-params function for accurate validation.
  path-params: "off"

  # Downgraded: false positive on schema properties named "examples" with array items
  oas3-valid-media-example: warn

  # Auto-fixable rules - keep enabled at warn for discovery
  operation-tags: warn
  oas3-api-servers: warn
  info-contact: warn
  oas3-unused-component: warn
  operation-operationId-unique: error
  oas3-valid-schema-example: error
  no-script-tags-in-markdown: warn

  # Not auto-fixable - downgrade to info
  operation-description: info
  info-description: info

  # Naming convention: sample resource example values use the example- prefix.
  # Flags my-/test-/foo-/demo-/sample- placeholder prefixes in example values.
  # warn (not error) so upstream-sourced examples don't block the build.
  sample-resource-example-naming:
    description: "Sample resource example values should use the example- prefix"
    message: "{{value}} uses a non-standard placeholder prefix; use 'example-' for sample resource names"
    severity: warn
    given:
      - "$..example"
      - "$..examples[*]"
    then:
      function: pattern
      functionOptions:
        notMatch: "^(my|test|foo|demo|sample)-[a-z]"
